[platformio]
src_dir = GridFlexEdge

[env:esp32s3-wifi-ci]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
lib_deps =
  bblanchon/ArduinoJson@7.4.3
  arduino-libraries/ArduinoHttpClient@0.6.1
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DUSE_LTE=0
  -DUSE_RS485_MODBUS=1

[env:esp32s3-lte-ci]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
lib_deps =
  bblanchon/ArduinoJson@7.4.3
  arduino-libraries/ArduinoHttpClient@0.6.1
  vshymanskyy/TinyGSM@0.12.0
  digitaldragon/SSLClient@1.3.1
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DUSE_LTE=1
  -DUSE_RS485_MODBUS=1
  -DMODBUS_DE_RE=25

; UNSIGNED desk candidate for Waveshare ESP32-S3-SIM7670G-4G / SIM7670X family.
; Modem UART from Waveshare schematic level-shifter net (GPIO17/18). PWRKEY candidate
; GPIO9 conflicts with camera Y4 on V1/V2 when camera is populated — leave camera off.
; External RS485 only; DE/RE=25 is a header candidate, not electrically verified.
; Do NOT treat CI success as board approval or flash authorization.
[env:esp32s3-waveshare-sim7670g-candidate]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
lib_deps =
  bblanchon/ArduinoJson@7.4.3
  arduino-libraries/ArduinoHttpClient@0.6.1
  vshymanskyy/TinyGSM@0.12.0
  digitaldragon/SSLClient@1.3.1
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DUSE_LTE=1
  -DUSE_RS485_MODBUS=1
  -DMODEM_RX=18
  -DMODEM_TX=17
  -DMODEM_PWR=9
  -DMODBUS_RX=15
  -DMODBUS_TX=16
  -DMODBUS_DE_RE=25
  -DBOARD_PINMAP_UNSIGNED_CANDIDATE=1
