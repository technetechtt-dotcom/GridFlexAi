[platformio]
src_dir = GridFlexEdge

[env:esp32s3-wifi-ci]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
lib_deps =
  bblanchon/ArduinoJson@7.4.3
  arduino-libraries/ArduinoHttpClient@0.6.1
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DUSE_LTE=0
  -DUSE_RS485_MODBUS=1

[env:esp32s3-lte-ci]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
lib_deps =
  bblanchon/ArduinoJson@7.4.3
  arduino-libraries/ArduinoHttpClient@0.6.1
  vshymanskyy/TinyGSM@0.12.0
  digitaldragon/SSLClient@1.3.1
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DUSE_LTE=1
  -DUSE_RS485_MODBUS=1
  -DMODBUS_DE_RE=25
