name: Release Backend Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Set image coordinates
        id: image
        shell: bash
        run: |
          mkdir -p release-evidence
          image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gridflex-backend"
          {
            echo "name=$image_name"
            echo "tags<<EOF"
            echo "$image_name:sha-$GITHUB_SHA"
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              echo "$image_name:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push commit-bound image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: false
          sbom: false

      - name: Generate registry image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: release-evidence/backend-image.spdx.json

      - name: Attest build provenance with GitHub OIDC
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM with GitHub OIDC
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: release-evidence/backend-image.spdx.json
          push-to-registry: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Keyless-sign image with GitHub OIDC
        env:
          IMAGE_REF: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Record release metadata
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          printf '%s\n' "$IMAGE_DIGEST" > release-evidence/backend-image-digest.txt
          node --input-type=module -e '
            import fs from "node:fs";
            fs.writeFileSync("release-evidence/release-metadata.json", JSON.stringify({
              schemaVersion: 1,
              commitSha: process.env.GITHUB_SHA,
              image: `${process.env.IMAGE_NAME}@${process.env.IMAGE_DIGEST}`,
              ref: process.env.GITHUB_REF,
              runId: process.env.GITHUB_RUN_ID,
              generatedAt: new Date().toISOString()
            }, null, 2) + "\n");
          '

      - name: Generate consolidated release evidence manifest
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
          CI_EVIDENCE_DIR: release-evidence
          CI_EVIDENCE_OUTPUT_DIR: release-evidence
        run: npm run ci:evidence-manifest

      - name: Upload release evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-${{ github.sha }}
          path: release-evidence
          if-no-files-found: error
          retention-days: 365
