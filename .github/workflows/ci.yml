name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EVIDENCE_RETENTION_DAYS: 30

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Lint GitHub workflows
        run: |
          set -o pipefail
          mkdir -p ci-evidence/security
          docker run --rm -v "$PWD:/repo" -w /repo \
            rhysd/actionlint:1.7.7@sha256:1d74bfc9fd1963af8f89a7c22afaaafd42f49aad711a09951d02cb996398f61d \
            2>&1 | tee ci-evidence/security/actionlint.log

      - name: Install and audit frontend dependencies
        run: |
          set -o pipefail
          npm ci 2>&1 | tee ci-evidence/security/frontend-install.log
          npm audit --omit=dev --audit-level=high 2>&1 | tee ci-evidence/security/frontend-audit.log

      - name: Install and audit backend dependencies
        run: |
          set -o pipefail
          npm ci 2>&1 | tee ../ci-evidence/security/backend-install.log
          npm audit --omit=dev --audit-level=high 2>&1 | tee ../ci-evidence/security/backend-audit.log
          npm run check:secrets-hygiene 2>&1 | tee ../ci-evidence/security/secrets-hygiene.log
        working-directory: backend

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-evidence
          path: ci-evidence/security
          if-no-files-found: error
          retention-days: ${{ env.EVIDENCE_RETENTION_DAYS }}

  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend
          mkdir -p ci-evidence/supply-chain

      - name: Validate vulnerability exceptions
        run: npm run ci:validate-vulnerability-exceptions

      - name: Generate dependency SBOMs
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@1.19.3 \
            --output-file ci-evidence/supply-chain/sbom-frontend.cdx.json --omit dev
          (cd backend && npx --yes @cyclonedx/cyclonedx-npm@1.19.3 \
            --output-file ../ci-evidence/supply-chain/sbom-backend.cdx.json --omit dev)

      - name: Scan tracked history for secrets
        run: |
          set -o pipefail
          docker run --rm -v "$PWD:/repo" -w /repo zricethezav/gitleaks:v8.24.0 \
            detect --source=. --config=.gitleaks.toml --verbose --no-git=false \
            2>&1 | tee ci-evidence/supply-chain/gitleaks.log

      - name: Build backend container image
        run: |
          set -o pipefail
          docker build -t gridflex-backend:ci ./backend \
            2>&1 | tee ci-evidence/supply-chain/container-build.log
          docker image inspect gridflex-backend:ci --format='{{.Id}}' \
            > ci-evidence/supply-chain/local-image-id.txt

      - name: Generate container SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: gridflex-backend:ci
          format: cyclonedx-json
          output-file: ci-evidence/supply-chain/sbom-backend-image.cdx.json

      - name: Enforce CRITICAL and HIGH vulnerability policy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: gridflex-backend:ci
          format: table
          output: ci-evidence/supply-chain/trivy-table.txt
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: ci-evidence/supply-chain/.trivyignore
          exit-code: "1"

      - name: Generate vulnerability SARIF
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: gridflex-backend:ci
          format: sarif
          output: ci-evidence/supply-chain/trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: ci-evidence/supply-chain/.trivyignore
          exit-code: "0"

      - name: Upload vulnerability SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: ci-evidence/supply-chain/trivy-backend.sarif

      - name: Upload supply-chain evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supply-chain-evidence
          path: ci-evidence/supply-chain
          if-no-files-found: error
          retention-days: 90

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: |
          set -o pipefail
          mkdir -p ci-evidence/frontend
          npm ci 2>&1 | tee ci-evidence/frontend/install.log

      - name: Validate, typecheck, and build frontend
        run: |
          set -o pipefail
          npm run check:env-parity 2>&1 | tee ci-evidence/frontend/env-parity.log
          npm run lint 2>&1 | tee ci-evidence/frontend/lint.log
          npm run typecheck 2>&1 | tee ci-evidence/frontend/typecheck.log
          npm run build 2>&1 | tee ci-evidence/frontend/build.log

      - name: Install Playwright browser
        run: |
          set -o pipefail
          npm run e2e:install 2>&1 | tee ci-evidence/frontend/playwright-install.log

      - name: Run frontend E2E tests
        run: |
          set -o pipefail
          npm run e2e 2>&1 | tee ci-evidence/frontend/e2e.log

      - name: Upload frontend test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-evidence
          path: |
            ci-evidence/frontend
            playwright-report
            test-results
          if-no-files-found: error
          retention-days: ${{ env.EVIDENCE_RETENTION_DAYS }}

  firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Cache PlatformIO
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: python -m pip install platformio==6.1.19

      - name: Compile ESP32-S3 firmware targets
        run: |
          mkdir -p ci-evidence/firmware
          set -o pipefail
          pio run --project-dir firmware -e esp32s3-wifi-ci \
            2>&1 | tee ci-evidence/firmware/esp32s3-wifi-ci-build.log
          pio run --project-dir firmware -e esp32s3-lte-ci \
            2>&1 | tee ci-evidence/firmware/esp32s3-lte-ci-build.log
          pio run --project-dir firmware -e esp32s3-waveshare-sim7670g-candidate \
            2>&1 | tee ci-evidence/firmware/esp32s3-waveshare-sim7670g-candidate-build.log
          echo "NOTE: waveshare candidate env is compile-only and does not approve the pin map." \
            | tee -a ci-evidence/firmware/esp32s3-waveshare-sim7670g-candidate-build.log

      - name: Collect firmware outputs and metadata
        env:
          PLATFORMIO_VERSION: 6.1.19
        run: npm run ci:firmware-evidence

      - name: Upload firmware evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firmware-evidence
          path: ci-evidence/firmware
          if-no-files-found: error
          retention-days: 90

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gridflex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gridflex_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/gridflex_test
      JWT_SECRET: test-secret-with-minimum-length
      CORS_ORIGIN: http://localhost:5173
      ADMIN_ALLOWED_EMAILS: admin@gridflex.ai
      ADMIN_ALLOWED_IPS: ""
      ADMIN_REQUIRE_HTTPS: false
      EDGE_INGEST_SHARED_SECRET: test-edge-secret-with-minimum-length
      PHYSICAL_COMMAND_EXECUTION_ENABLED: false
      HIL_PLANT_APPROVAL_CONFIRMED: false
      PILOT_LOCK_PHYSICAL_EXECUTION: true
      DEVICE_SECRET_VAULT_PROVIDER: local
      DEVICE_SECRET_VAULT_KEY: dGVzdC1kZXZpY2Utc2VjcmV0LXZhdWx0LWtleS0zMiEh
      DEVICE_SECRET_VAULT_KEY_ID: local-test
      GRIDFLEX_OPERATING_MODE: SIMULATION
      OPENAI_API_KEY: test-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          set -o pipefail
          mkdir -p ../ci-evidence/backend
          npm ci 2>&1 | tee ../ci-evidence/backend/install.log

      - name: Generate Prisma client
        run: |
          set -o pipefail
          npx prisma generate 2>&1 | tee ../ci-evidence/backend/prisma-generate.log

      - name: Verify migrations against an empty database
        run: |
          set -o pipefail
          PGPASSWORD=postgres createdb -h localhost -U postgres gridflex_shadow
          npx prisma migrate deploy 2>&1 | tee ../ci-evidence/backend/migrate-deploy.log
          npx prisma migrate deploy 2>&1 | tee ../ci-evidence/backend/migrate-idempotence.log
          npx prisma migrate status 2>&1 | tee ../ci-evidence/backend/migrate-status.log
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url postgresql://postgres:postgres@localhost:5432/gridflex_shadow \
            --exit-code 2>&1 | tee ../ci-evidence/backend/migrate-diff.log

      - name: Typecheck and build backend
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee ../ci-evidence/backend/typecheck.log
          npm run build 2>&1 | tee ../ci-evidence/backend/build.log

      - name: Run backend tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee ../ci-evidence/backend/tests.log
          npx jest tests/health.routes.test.ts --runInBand \
            2>&1 | tee ../ci-evidence/backend/health-smoke.log

      - name: Upload backend test and migration evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-evidence
          path: ci-evidence/backend
          if-no-files-found: error
          retention-days: ${{ env.EVIDENCE_RETENTION_DAYS }}

  evidence-manifest:
    if: always()
    needs: [security, supply-chain, frontend, firmware, backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download available evidence
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*-evidence"
          path: ci-evidence

      - name: Record job outcomes
        env:
          JOB_RESULTS: ${{ toJSON(needs) }}
        run: |
          mkdir -p ci-evidence/workflow
          printf '%s\n' "$JOB_RESULTS" > ci-evidence/workflow/job-results.json

      - name: Generate commit-bound evidence manifest
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
          CI_EVIDENCE_OUTPUT_DIR: ci-evidence/manifest
        run: npm run ci:evidence-manifest

      - name: Upload consolidated evidence manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-manifest-${{ github.sha }}
          path: ci-evidence/manifest
          if-no-files-found: error
          retention-days: 90
