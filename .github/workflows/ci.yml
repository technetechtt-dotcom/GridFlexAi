name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Audit backend production dependencies
        run: npm audit --omit=dev --audit-level=critical
        working-directory: backend

  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate frontend SBOM (CycloneDX)
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom-frontend.cdx.json --omit dev

      - name: Generate backend SBOM (CycloneDX)
        run: npx @cyclonedx/cyclonedx-npm --output-file ../sbom-backend.cdx.json --omit dev
        working-directory: backend

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom-frontend.cdx.json
            sbom-backend.cdx.json

      - name: Run secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend container image
        run: docker build -t gridflex-backend:ci ./backend

      - name: Generate container SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: gridflex-backend:ci
          format: cyclonedx-json
          output-file: sbom-backend-image.cdx.json

      - name: Scan backend container image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: gridflex-backend:ci
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Run frontend E2E tests
        run: npm run e2e

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gridflex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gridflex_test
      JWT_SECRET: test-secret-with-minimum-length
      CORS_ORIGIN: http://localhost:5173
      ADMIN_ALLOWED_EMAILS: admin@gridflex.ai
      ADMIN_ALLOWED_IPS: ""
      ADMIN_REQUIRE_HTTPS: false
      EDGE_INGEST_SHARED_SECRET: test-edge-secret-with-minimum-length
      PHYSICAL_COMMAND_EXECUTION_ENABLED: false
      HIL_PLANT_APPROVAL_CONFIRMED: false
      DEVICE_SECRET_VAULT_PROVIDER: local
      DEVICE_SECRET_VAULT_KEY: dGVzdC1kZXZpY2Utc2VjcmV0LXZhdWx0LWtleS0zMiEh
      DEVICE_SECRET_VAULT_KEY_ID: local-test
      GRIDFLEX_OPERATING_MODE: SIMULATION
      OPENAI_API_KEY: test-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck backend
        run: npm run typecheck

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm test

      - name: Health route smoke test
        run: npx jest tests/health.routes.test.ts --runInBand
