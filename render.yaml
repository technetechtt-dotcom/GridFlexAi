services:
  - type: redis
    name: gridflex-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: gridflex-backend
    env: node
    rootDir: backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health/live
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: gridflex-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACTIVE_KID
        value: v1
      - key: JWT_SECRETS_JSON
        sync: false
      - key: JWT_PREVIOUS_SECRET
        sync: false
      - key: JWT_PREVIOUS_KID
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_ALLOWED_EMAILS
        sync: false
      - key: ADMIN_ALLOWED_IPS
        value: ""
      - key: ADMIN_REQUIRE_HTTPS
        value: "true"
      - key: ADMIN_MAX_TOKEN_AGE_MINUTES
        value: "30"
      - key: EDGE_INGEST_SHARED_SECRET
        generateValue: true
      - key: EDGE_INGEST_MAX_SKEW_SECONDS
        value: "300"
      - key: EDGE_RATE_LIMIT_MAX_PER_MINUTE
        value: "30"
      - key: EDGE_ALLOW_LEGACY_SHARED_SECRET
        value: "false"
      - key: EDGE_REPLAY_REQUIRE_REDIS
        value: "true"
      - key: EDGE_ALLOW_MEMORY_REPLAY
        value: "false"
      - key: PHYSICAL_COMMAND_EXECUTION_ENABLED
        value: "false"
      - key: HIL_PLANT_APPROVAL_CONFIRMED
        value: "false"
      - key: DEVICE_SECRET_VAULT_PROVIDER
        value: aws_kms
      - key: AWS_KMS_KEY_ID
        sync: false
      - key: GRIDFLEX_OPERATING_MODE
        value: SIMULATION
      - key: FORECAST_RATE_LIMIT_MAX_PER_MINUTE
        value: "20"
      - key: FORECAST_CRON_ENABLED
        value: "true"
      - key: FORECAST_CRON_SCHEDULE
        value: "*/30 * * * *"
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ACCUWEATHER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FORECAST_CIRCUIT_FAILURE_THRESHOLD
        value: "3"
      - key: FORECAST_CIRCUIT_OPEN_MS
        value: "180000"

  - type: web
    name: gridflex-frontend
    env: static
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
