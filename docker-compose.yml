services:
  postgres:
    image: postgres:16
    container_name: gridflex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gridflex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the deployment environment}
      POSTGRES_DB: ${POSTGRES_DB:-gridflex}
    ports:
      - "5432:5432"
    volumes:
      - gridflex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gridflex} -d ${POSTGRES_DB:-gridflex}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: gridflex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - gridflex-redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gridflex-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in the deployment environment}
      DIRECT_URL: ${DIRECT_URL:?Set DIRECT_URL to a non-pooler Postgres connection}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in the deployment environment}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN to the HTTPS frontend origin}
      REDIS_URL: redis://redis:6379
      EDGE_ALLOW_LEGACY_SHARED_SECRET: "false"
      EDGE_REPLAY_REQUIRE_REDIS: "true"
      EDGE_ALLOW_MEMORY_REPLAY: "false"
      PHYSICAL_COMMAND_EXECUTION_ENABLED: "false"
      HIL_PLANT_APPROVAL_CONFIRMED: "false"
      PILOT_LOCK_PHYSICAL_EXECUTION: "true"
      DEVICE_SECRET_VAULT_PROVIDER: ${DEVICE_SECRET_VAULT_PROVIDER:-aws_kms}
      AWS_KMS_KEY_ID: ${AWS_KMS_KEY_ID:?Set AWS_KMS_KEY_ID for aws_kms vault}
      AWS_REGION: ${AWS_REGION:-}
      GRIDFLEX_OPERATING_MODE: ${GRIDFLEX_OPERATING_MODE:-SIMULATION}
      FORECAST_CIRCUIT_FAILURE_THRESHOLD: 3
      FORECAST_CIRCUIT_OPEN_MS: 180000
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      ACCUWEATHER_API_KEY: ${ACCUWEATHER_API_KEY:-}
    ports:
      - "4000:4000"

volumes:
  gridflex-postgres-data:
  gridflex-redis-data:
